<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="PYRAMID — hierarchical agent orchestration for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0e1c"/>
      <stop offset="1" stop-color="#141031"/>
    </linearGradient>
    <linearGradient id="apex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a3"/>
      <stop offset="1" stop-color="#ffc857"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2a65a"/>
      <stop offset="1" stop-color="#e07b3f"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b96a45"/>
      <stop offset="1" stop-color="#8c4d3f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#8fa3ff" opacity="0.5">
    <circle cx="90" cy="52" r="1.4"/><circle cx="210" cy="120" r="1"/><circle cx="330" cy="38" r="1.2"/>
    <circle cx="150" cy="230" r="1"/><circle cx="420" cy="200" r="1.3"/><circle cx="520" cy="60" r="1"/>
    <circle cx="1120" cy="46" r="1.4"/><circle cx="1035" cy="150" r="1"/><circle cx="1160" cy="220" r="1.2"/>
    <circle cx="660" cy="34" r="1"/><circle cx="60" cy="150" r="1.2"/><circle cx="980" cy="70" r="1.1"/>
  </g>

  <!-- the pyramid: three tiers, one conductor light at the apex -->
  <g transform="translate(890,40)" filter="url(#glow)">
    <circle cx="0" cy="6" r="5" fill="#fffbe6"/>
    <polygon points="0,22 -34,78 34,78" fill="url(#apex)"/>
    <polygon points="-42,90 -78,146 78,146 42,90" fill="url(#mid)"/>
    <polygon points="-86,158 -122,214 122,214 86,158" fill="url(#base)"/>
  </g>
  <!-- tier legend -->
  <g font-family="Menlo, Consolas, monospace" font-size="13" fill="#9aa7d9" text-anchor="start">
    <text x="1032" y="95">fable · conducts</text>
    <text x="1032" y="163">opus · builds</text>
    <text x="1032" y="231">sonnet ×3 · verified</text>
  </g>

  <!-- wordmark -->
  <g font-family="Helvetica Neue, Arial, sans-serif">
    <text x="80" y="150" font-size="76" font-weight="800" letter-spacing="26" fill="#f4f6ff">PYRAMID</text>
    <text x="84" y="196" font-size="21" letter-spacing="2" fill="#b8c2ee">one conductor · opus lanes · verified sonnet helpers</text>
    <text x="84" y="238" font-size="15" letter-spacing="1" fill="#7c88bd">▲ a hierarchical agent-orchestration doctrine for Claude Code</text>
  </g>

  <line x1="80" y1="166" x2="560" y2="166" stroke="#3b4677" stroke-width="1"/>
</svg>
